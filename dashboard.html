<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة المركزية - نظام التسيير الإداري</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        if (sessionStorage.getItem("authenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
</head>
<body>

    <div class="no-print">
        <header class="main-header">
            <div style="position: absolute; top: 10px; left: 20px;">
                <a href="index.html" onclick="sessionStorage.removeItem('authenticated')" style="color: white; text-decoration: none; font-size: 14px;">تسجيل الخروج ⤾</a>
            </div>
            <h1 class="header-title">المكتبة المركزية</h1>
            <div class="logo-container">
                <div class="university-text">
                    <span class="univ-main">جامعة عبد الله مرسلي</span>
                    <span class="univ-sub">تيبازة</span>
                </div>
                <img src="logo.jpg" alt="شعار جامعة تيبازة" class="university-logo">
            </div>
        </header>

        <div class="page-title-container">
            <h2 class="page-title">الصفحة الرئيسية لتسيير الإدارة</h2>
        </div>

        <nav class="navbar">
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDropdown(event)">صفحة المديرية ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="loadContent('وصل إقرار إيداع نسخة من المطبوعة')">وصل إقرار إيداع نسخة من المطبوعة</a>
                    <a href="#" onclick="loadContent('وصل إقرار إيداع نسخة أطروحة الدكتوراه')">وصل إقرار إيداع نسخة أطروحة الدكتوراه</a>
                </div>
            </div>
        </nav>

        <main class="content-area">
            <div class="dynamic-form-container" id="form-box" style="display: none;">
                <h3 id="form-title">اسم الاستمارة</h3>
                
                <!-- إضافة خانة البحث هنا -->
                <div id="search-box" style="background: #f9f9f9; padding: 15px; margin: 10px 0; border: 1px dashed #27ae60; border-radius: 5px;">
                    <label>بحث في الأرشيف (الرقم الإداري): </label>
                    <input type="number" id="in-search" placeholder="أدخل الرقم...">
                    <button type="button" onclick="searchData()" style="padding: 5px 15px; cursor: pointer;">بحث</button>
                </div>

                <hr style="border: 0; border-top: 2px solid #27ae60; margin: 15px 0;">
                
                <form id="active-form" onsubmit="handleFormSubmit(event)">
                    <div id="form-fields" class="form-grid"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-save">حفظ في الأرشيف</button>
                        <button type="button" class="btn btn-print" onclick="printDocument()">طباعة الوصل</button>
                        <button type="button" class="btn btn-cancel" onclick="closeForm()">خروج</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- (يتم وضع القوالب هنا كما في كودك الأصلي) -->
    <div id="print-templates-container" class="print-only">
        <!-- ... نفس القوالب التي لديك ... -->
    </div>

    <script>
        let currentActiveForm = "";

        // دالة حفظ البيانات في الأرشيف
        function handleFormSubmit(event) {
            event.preventDefault();
            const formData = {};
            document.querySelectorAll('#active-form input, #active-form select').forEach(input => {
                if (input.id !== 'in-search') formData[input.id] = input.value;
            });

            let storageKey = currentActiveForm.includes('مطبوعة') ? "archive_pub" : "archive_doc";
            let archive = JSON.parse(localStorage.getItem(storageKey) || "[]");
            archive.push(formData);
            localStorage.setItem(storageKey, JSON.stringify(archive));
            alert("تم حفظ البيانات في الأرشيف بنجاح!");
        }

        // دالة البحث في الأرشيف
        function searchData() {
            const searchNum = document.getElementById('in-search').value;
            let storageKey = currentActiveForm.includes('مطبوعة') ? "archive_pub" : "archive_doc";
            let archive = JSON.parse(localStorage.getItem(storageKey) || "[]");
            
            const numField = currentActiveForm.includes('مطبوعة') ? 'in-pub-num' : 'in-doc-num';
            const found = archive.find(item => item[numField] == searchNum);

            if (found) {
                for (let key in found) {
                    let el = document.getElementById(key);
                    if (el) el.value = found[key];
                }
                alert("تم العثور على الوثيقة!");
            } else {
                alert("لم يتم العثور على سجل بهذا الرقم.");
            }
        }

        // دالة تحميل المحتوى (تم دمجها كما هي مع الحفاظ على logic الخاص بك)
        function loadContent(pageName) {
            currentActiveForm = pageName;
            // ... (نفس منطق بناء الحقول في كودك الأصلي)
            // ملاحظة: تأكد من إضافة باقي الـ if والـ else الخاصة بك هنا
        }

        // ... (باقي الدوال: toggleDropdown, printDocument, closeForm كما هي في كودك)
    </script>
</body>
</html>
