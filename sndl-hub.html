<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة المركزية - تسجيلات SNDL</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #1e3a5f;
            --light-blue: #3b82f6;
            --accent-green: #22c55e;
            --hover-green: #16a34a;
            --bg-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .hub-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border-top: 6px solid var(--primary-blue);
        }

        .main-title {
            background-color: var(--accent-green);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 40px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-link {
            display: block;
            background-color: var(--light-blue);
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.15);
        }

        .btn-link:hover {
            background-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(30, 58, 95, 0.2);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #64748b;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .btn-back:hover {
            background-color: #475569;
        }

        .btn-link::before {
            content: "🔗 ";
            margin-left: 8px;
        }
        .btn-back::before {
            content: "↩️ ";
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="main-title">تسجيلات في SNDL</div>

        <div class="buttons-grid">
            <a href="https://bit.ly/4xq1doq" class="btn-link">
               طلبات التسجيل SNDL (AppSheet)
            </a>

            <a href="https://www.sndl.cerist.dz/user.php?md=5&st=1&ex=1" class="btn-link">
               منصة التسجيل SNDL (CERIST)
            </a>
        </div>

        <a href="index.html" class="btn-back">العودة إلى الصفحة الرئيسية</a>
    </div>

</body>
</html>
