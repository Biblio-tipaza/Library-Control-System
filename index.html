<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - المكتبة المركزية</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* إضافة الخلفية هنا */
            background-image: url('100.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        form {
            background: rgba(255, 255, 255, 0.85); /* خلفية بيضاء شفافة للنموذج */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <form id="loginForm">
        <img src="logo.jpg" alt="شعار المكتبة" class="logo">
        <h2>نظام تسيير المكتبة</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
    </form>

<script>
    document.getElementById("loginForm").onsubmit = function(event) {
        event.preventDefault();
        var user = document.getElementById("username").value;
        var pass = document.getElementById("password").value;

        if (user === "admin" && pass === "Azerty@2026") {
            // --- إضافة هذا السطر هو الحل ---
            sessionStorage.setItem("authenticated", "true"); 
            // -----------------------------
            window.location.href = "dashboard.html";
        } else {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
        }
    };
</script>
</body>
</html>
